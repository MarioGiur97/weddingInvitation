<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mario & Valentina | Invito di Matrimonio</title>

  <meta name="description" content="Siete invitati al matrimonio di Mario e Valentina" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Mario & Valentina" />
  <meta property="og:description" content="Siete invitati al nostro matrimonio" />
  <meta property="og:image" content="./og-image.jpg" />
  <meta property="og:locale" content="it_IT" />
  <meta name="theme-color" content="#9ba287" />

  <style>
    :root {
      --sage: #9fa68c;
      --sage-dark: #7f866d;
      --sage-light: #b1b79d;
      --paper-shadow: rgba(48, 42, 34, 0.22);
      --wood-1: #cba37d;
      --wood-2: #bc916b;
      --wood-3: #d6b18d;
      --gold: #c89a56;
      --gold-dark: #9f7338;
      --gold-light: #efd6a5;
      --wax: #be9354;
      --wax-dark: #9b6d37;
      --text: #3e352d;
      --ivory: #f8f3ea;
      --shadow-xl: 0 28px 55px rgba(44, 33, 23, 0.20);
      --shadow-md: 0 14px 26px rgba(44, 33, 23, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      background:
        linear-gradient(115deg, rgba(255,255,255,0.05), rgba(0,0,0,0.05)),
        repeating-linear-gradient(
          12deg,
          var(--wood-1) 0px,
          var(--wood-1) 22px,
          var(--wood-2) 22px,
          var(--wood-2) 44px,
          var(--wood-3) 44px,
          var(--wood-3) 72px
        );
    }

    .page-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.18), transparent 30%),
        radial-gradient(circle at 80% 80%, rgba(255,255,255,0.12), transparent 34%);
    }

    .wrapper {
      width: min(100%, 1050px);
      padding: 30px 18px 54px;
      position: relative;
    }

    .intro {
      text-align: center;
      margin-bottom: 18px;
      animation: fadeIn 0.9s ease;
    }

    .eyebrow {
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-size: 0.72rem;
      color: rgba(62, 53, 45, 0.72);
      margin-bottom: 10px;
    }

    .title {
      margin: 0;
      font-size: clamp(2.2rem, 4vw, 4.2rem);
      font-weight: 500;
      line-height: 1.05;
      color: #4a3e34;
      text-shadow: 0 1px 0 rgba(255,255,255,0.18);
    }

    .experience {
      margin-top: 20px;
      display: grid;
      place-items: center;
      min-height: 720px;
      position: relative;
    }

    .envelope-stage {
      position: relative;
      width: min(92vw, 760px);
      height: min(92vw, 620px);
      user-select: none;
    }

    .stack {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .stack-envelope {
      position: absolute;
      width: 470px;
      height: 315px;
      border-radius: 8px;
      background:
        linear-gradient(180deg, #afb69c 0%, #a2a98f 50%, #949b82 100%);
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(255,255,255,0.18);
    }

    .stack-envelope::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.12), transparent 35%),
        repeating-linear-gradient(
          135deg,
          rgba(255,255,255,0.025) 0px,
          rgba(255,255,255,0.025) 6px,
          rgba(0,0,0,0.02) 6px,
          rgba(0,0,0,0.02) 12px
        );
      opacity: 0.55;
    }

    .stack-envelope.one {
      top: 70px;
      left: 110px;
      transform: rotate(-8deg);
    }

    .stack-envelope.two {
      top: 26px;
      left: 170px;
      transform: rotate(6deg);
    }

    .main-envelope-wrap {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      z-index: 4;
    }

    .main-envelope {
      position: relative;
      width: min(88vw, 560px);
      aspect-ratio: 1.45 / 1;
      filter: drop-shadow(0 34px 44px rgba(56, 39, 25, 0.24));
    }

    .envelope-back {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      overflow: hidden;
      background:
        linear-gradient(180deg, #b2b99f 0%, var(--sage-light) 12%, var(--sage) 55%, #8e967d 100%);
      border: 1px solid rgba(255,255,255,0.20);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.18),
        inset 0 -12px 18px rgba(62, 72, 53, 0.12);
    }

    .envelope-back::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.14), transparent 30%),
        repeating-linear-gradient(
          135deg,
          rgba(255,255,255,0.028) 0px,
          rgba(255,255,255,0.028) 8px,
          rgba(0,0,0,0.018) 8px,
          rgba(0,0,0,0.018) 16px
        );
      opacity: 0.75;
    }

    /* BIGLIETTO: ora sta DAVANTI alla busta */
    .invite-card {
      position: absolute;
      left: 50%;
      top: 18%;
      transform: translateX(-50%) translateY(210px);
      width: min(70%, 380px);
      opacity: 0;
      pointer-events: none;
      transition: transform 1.25s cubic-bezier(.2,.9,.2,1), opacity 0.55s ease;
      z-index: 20;
    }

    .invite-card img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 7px;
      box-shadow: 0 20px 38px rgba(50, 37, 27, 0.24);
      border: 8px solid rgba(255,255,255,0.32);
      background: #fff;
    }

    .front-pocket {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 57%;
      border-radius: 0 0 10px 10px;
      background:
        linear-gradient(180deg, #9ea68c 0%, #8f977e 42%, var(--sage-dark) 100%);
      clip-path: polygon(0 0, 50% 68%, 100% 0, 100% 100%, 0 100%);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.15),
        inset 0 -10px 20px rgba(56, 68, 47, 0.14);
      z-index: 5;
    }

    .front-pocket::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(0,0,0,0.04));
      clip-path: polygon(0 0, 50% 68%, 100% 0, 100% 100%, 0 100%);
      pointer-events: none;
    }

    .flap {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 51%;
      transform-origin: top center;
      transform-style: preserve-3d;
      transition: transform 1.1s cubic-bezier(.2,.9,.2,1);
      z-index: 7;
    }

    .flap-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 10px 10px 0 0;
      clip-path: polygon(0 0, 50% 100%, 100% 0);
    }

    .flap-front {
      background:
        linear-gradient(180deg, #b0b89e 0%, #9ca58b 46%, #87916f 100%);
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.18),
        inset 0 -8px 16px rgba(64, 75, 53, 0.12);
    }

    /* FRECCIA BEIGE ELIMINATA */
    .flap-back {
      display: none;
    }

    .string {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      transition: opacity 0.35s ease, transform 0.5s ease;
    }

    .string-line {
      position: absolute;
      width: 2px;
      height: 138%;
      top: -20%;
      left: 50%;
      transform-origin: top center;
      background: linear-gradient(180deg, #e9d7a2 0%, #cba867 48%, #a78142 100%);
      box-shadow: 0 0 1px rgba(114, 81, 31, 0.35);
      opacity: 0.95;
    }

    .string-line.one {
      transform: translateX(-50%) rotate(11deg);
    }

    .string-line.two {
      transform: translateX(-50%) rotate(-9deg);
    }

    .seal {
      position: absolute;
      left: 50%;
      top: 38%;
      transform: translate(-50%, -50%);
      width: 112px;
      height: 112px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      z-index: 10;
      cursor: pointer;
      background:
        radial-gradient(circle at 30% 28%, var(--gold-light) 0 12%, #d5b077 13% 22%, var(--wax) 42%, var(--wax-dark) 100%);
      border: 4px solid rgba(255,248,235,0.16);
      box-shadow:
        0 16px 28px rgba(91, 62, 26, 0.25),
        inset 0 2px 10px rgba(255,255,255,0.36),
        inset 0 -8px 12px rgba(103, 71, 31, 0.28);
    }

    .seal::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px dashed rgba(255, 248, 235, 0.18);
      pointer-events: none;
    }

    .seal span {
      position: relative;
      z-index: 2;
      font-size: 2.05rem;
      line-height: 1;
      font-style: italic;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: #fff8ec;
      text-transform: lowercase;
      text-shadow: 0 1px 2px rgba(0,0,0,0.16);
      font-family: "Times New Roman", Georgia, serif;
      transform: translateY(-1px);
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: -54px;
      transform: translateX(-50%);
      width: 100%;
      text-align: center;
      font-size: 0.95rem;
      color: rgba(62, 53, 45, 0.76);
      transition: opacity 0.35s ease;
    }

    .envelope-stage.opened .hint {
      opacity: 0;
    }

    .petals {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 20;
    }

    .petal {
      position: absolute;
      width: 10px;
      height: 16px;
      border-radius: 60% 40% 70% 30%;
      background: linear-gradient(180deg, rgba(212,184,126,0.82), rgba(212,184,126,0.14));
      opacity: 0;
    }

    .envelope-stage.opened .petal {
      animation: fall 3.8s ease-in infinite;
      opacity: 0.88;
    }

    .petal:nth-child(1) { left: 14%; animation-delay: 0.15s; }
    .petal:nth-child(2) { left: 25%; animation-delay: 0.85s; }
    .petal:nth-child(3) { left: 39%; animation-delay: 0.45s; }
    .petal:nth-child(4) { left: 54%; animation-delay: 1.20s; }
    .petal:nth-child(5) { left: 70%; animation-delay: 0.35s; }
    .petal:nth-child(6) { left: 83%; animation-delay: 1.05s; }

    .envelope-stage.opened .flap {
      transform: rotateX(180deg);
    }

    .envelope-stage.opened .string {
      opacity: 0;
      transform: scale(0.97);
    }

    .envelope-stage.opened .seal {
      opacity: 0;
      transform: translate(-50%, -30%) scale(0.78);
      pointer-events: none;
      transition: opacity 0.28s ease, transform 0.6s ease;
    }

    .envelope-stage.opened .invite-card {
      opacity: 1;
      transform: translateX(-50%) translateY(-65px);
      pointer-events: auto;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fall {
      0% {
        transform: translateY(-26px) rotate(0deg);
        opacity: 0;
      }
      12% {
        opacity: 0.88;
      }
      100% {
        transform: translateY(680px) translateX(22px) rotate(250deg);
        opacity: 0;
      }
    }

    @media (max-width: 860px) {
      .stack-envelope {
        display: none;
      }
    }

    @media (max-width: 640px) {
      .wrapper {
        padding-top: 20px;
      }

      .experience {
        min-height: 590px;
      }

      .main-envelope {
        width: min(92vw, 520px);
      }

      .seal {
        width: 96px;
        height: 96px;
      }

      .seal span {
        font-size: 1.8rem;
      }

      .hint {
        bottom: -42px;
        font-size: 0.9rem;
      }

      .invite-card {
        width: min(76%, 340px);
      }
    }
  </style>
</head>
<body>
  <div class="page-glow"></div>

  <main class="wrapper">
    <section class="intro">
      <div class="eyebrow">Wedding Invitation</div>
      <h1 class="title">Mario &amp; Valentina</h1>
    </section>

    <section class="experience">
      <div class="envelope-stage" id="envelopeStage">

        <div class="stack" aria-hidden="true">
          <div class="stack-envelope one"></div>
          <div class="stack-envelope two"></div>
        </div>

        <div class="main-envelope-wrap">
          <div class="main-envelope">
            <div class="envelope-back"></div>

            <div class="invite-card" id="inviteCard">
              <img src="./invito.jpg" alt="Invito di matrimonio Mario e Valentina" />
            </div>

            <div class="flap">
              <div class="flap-face flap-front"></div>
              <div class="flap-face flap-back"></div>
            </div>

            <div class="front-pocket"></div>

            <div class="string" aria-hidden="true">
              <div class="string-line one"></div>
              <div class="string-line two"></div>
            </div>

            <div class="seal" id="seal" role="button" tabindex="0" aria-label="Apri l'invito">
              <span>m.v</span>
            </div>
          </div>
        </div>

        <div class="petals" aria-hidden="true">
          <span class="petal"></span>
          <span class="petal"></span>
          <span class="petal"></span>
          <span class="petal"></span>
          <span class="petal"></span>
          <span class="petal"></span>
        </div>

        <div class="hint">Premi sul sigillo per aprire l'invito</div>
      </div>
    </section>
  </main>

  <script>
    const envelopeStage = document.getElementById("envelopeStage");
    const seal = document.getElementById("seal");

    let isOpen = false;

    function openInvite() {
      if (isOpen) return;
      isOpen = true;
      envelopeStage.classList.add("opened");
    }

    seal.addEventListener("click", function (e) {
      e.stopPropagation();
      openInvite();
    });

    seal.addEventListener("keydown", function (e) {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        openInvite();
      }
    });
  </script>
</body>
</html>
