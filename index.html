<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mario & Valentina | Invito di Matrimonio</title>

  <!--
    NOTE GITHUB PAGES
    1) Pubblica questo file come index.html nella root del repository.
    2) Per avere l'anteprima WhatsApp/iMessage, crea un'immagine chiamata og-image.jpg
       e caricala nella stessa cartella di questo file. Dimensione consigliata: 1200x630.
    3) Sostituisci i placeholder DATA / CHIESA / RICEVIMENTO / RSVP.
  -->

  <meta name="description" content="Siete invitati al matrimonio di Mario e Valentina" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Mario & Valentina" />
  <meta property="og:description" content="Siete invitati al nostro matrimonio" />
  <meta property="og:image" content="./og-image.jpg" />
  <meta property="og:locale" content="it_IT" />
  <meta name="theme-color" content="#6f7f68" />

  <style>
    :root {
      --sage: #9caf88;
      --sage-dark: #7f946e;
      --ivory: #f8f3ea;
      --cream: #efe4d2;
      --gold: #c9a96a;
      --gold-soft: #e7cf9b;
      --text: #40362f;
      --paper-line: rgba(64, 54, 47, 0.08);
      --shadow: 0 24px 60px rgba(35, 28, 24, 0.18);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.65), transparent 30%),
        linear-gradient(180deg, #dce2d6 0%, #eef0ea 42%, #f6f2ea 100%);
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    .background-flower,
    .background-flower::before,
    .background-flower::after {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(1px);
      opacity: 0.23;
      z-index: 0;
    }

    .background-flower {
      width: 320px;
      height: 320px;
      right: -80px;
      top: -70px;
      background: radial-gradient(circle, rgba(201,169,106,0.45) 0 26%, transparent 27%),
                  radial-gradient(circle, rgba(111,127,104,0.22) 0 58%, transparent 59%);
    }

    .background-flower::before {
      content: "";
      width: 230px;
      height: 230px;
      left: -1080px;
      top: 540px;
      background: radial-gradient(circle, rgba(201,169,106,0.38) 0 24%, transparent 25%),
                  radial-gradient(circle, rgba(111,127,104,0.18) 0 56%, transparent 57%);
    }

    .background-flower::after {
      content: "";
      width: 180px;
      height: 180px;
      left: -920px;
      top: 780px;
      background: radial-gradient(circle, rgba(201,169,106,0.28) 0 22%, transparent 23%),
                  radial-gradient(circle, rgba(111,127,104,0.14) 0 58%, transparent 59%);
    }

    .wrapper {
      width: min(100%, 980px);
      padding: 28px 18px 40px;
      position: relative;
      z-index: 1;
    }

    .intro {
      text-align: center;
      margin-bottom: 18px;
      animation: fadeIn 1s ease;
    }

    .eyebrow {
      letter-spacing: 0.26em;
      text-transform: uppercase;
      font-size: 0.72rem;
      color: rgba(64, 54, 47, 0.72);
      margin-bottom: 10px;
    }

    .title {
      margin: 0;
      font-size: clamp(2.2rem, 4vw, 4.3rem);
      font-weight: 500;
      line-height: 1.05;
    }

    .subtitle {
      margin: 14px auto 0;
      max-width: 560px;
      font-size: 1rem;
      line-height: 1.65;
      color: rgba(64, 54, 47, 0.84);
    }

    .experience {
      margin-top: 28px;
      display: grid;
      place-items: center;
      min-height: 640px;
      position: relative;
    }

    .envelope-stage {
      width: min(92vw, 560px);
      aspect-ratio: 1.18 / 1;
      position: relative;
      cursor: pointer;
      perspective: 1600px;
      user-select: none;
      transition: transform 0.35s ease;
    }

    .envelope-stage:hover {
      transform: translateY(-4px);
    }

    .hint {
      position: absolute;
      bottom: -54px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.95rem;
      color: rgba(64, 54, 47, 0.72);
      text-align: center;
      width: 100%;
      transition: opacity 0.35s ease;
    }

    .envelope-stage.opened .hint {
      opacity: 0;
    }

    .envelope {
      position: absolute;
      inset: 0;
      filter: drop-shadow(0 26px 40px rgba(58, 46, 38, 0.18));
    }

    .back-pocket {
      position: absolute;
      inset: 16% 6% 6% 6%;
      background: linear-gradient(180deg, #87937f 0%, var(--sage) 100%);
      border-radius: 18px;
      overflow: hidden;
    }

    .back-pocket::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.18), transparent 45%),
        linear-gradient(225deg, rgba(0,0,0,0.06), transparent 35%);
    }

    .front-pocket {
      position: absolute;
      left: 6%;
      right: 6%;
      bottom: 6%;
      height: 56%;
      background: linear-gradient(180deg, #778671 0%, var(--sage-dark) 100%);
      border-radius: 0 0 18px 18px;
      clip-path: polygon(0 0, 50% 62%, 100% 0, 100% 100%, 0 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .flap {
      position: absolute;
      left: 6%;
      right: 6%;
      top: 16%;
      height: 46%;
      transform-origin: top center;
      transform-style: preserve-3d;
      transition: transform 1.15s cubic-bezier(.2,.9,.2,1);
      z-index: 6;
    }

    .flap-face {
      position: absolute;
      inset: 0;
      clip-path: polygon(0 0, 50% 100%, 100% 0);
      border-radius: 12px;
      backface-visibility: hidden;
    }

    .flap-front {
      background: linear-gradient(180deg, #7f8c78 0%, #65715f 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
    }

    .flap-back {
      background: linear-gradient(180deg, #ebdfcc 0%, #deceb7 100%);
      transform: rotateX(180deg);
    }

    .seal {
      position: absolute;
      top: 46%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 104px;
      height: 104px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 30%, var(--gold-soft) 0 16%, var(--gold) 38%, #a88047 100%);
      box-shadow:
        0 10px 20px rgba(87, 60, 23, 0.22),
        inset 0 2px 10px rgba(255,255,255,0.35),
        inset 0 -6px 12px rgba(99, 71, 24, 0.28);
      display: grid;
      place-items: center;
      z-index: 8;
      transition: opacity 0.3s ease, transform 0.7s ease;
    }

    .seal span {
      font-size: 2rem;
      font-weight: 500;
      font-style: italic;
      letter-spacing: 0.04em;
      color: #fff8eb;
      text-shadow: 0 1px 2px rgba(0,0,0,0.18);
      font-family: "Times New Roman", Georgia, serif;
    }

    .invite-card {
      position: absolute;
      left: 50%;
      top: 28%;
      transform: translateX(-50%) translateY(185px);
      width: min(84%, 430px);
      min-height: 520px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.62), rgba(255,255,255,0.25)),
        repeating-linear-gradient(180deg, transparent 0 28px, var(--paper-line) 29px 30px),
        var(--ivory);
      border-radius: 8px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(99, 80, 58, 0.1);
      padding: 40px 32px 34px;
      text-align: center;
      transition: transform 1.25s cubic-bezier(.2,.9,.2,1), opacity 0.6s ease;
      z-index: 3;
      opacity: 0;
      pointer-events: none;
    }

    .invite-card::before,
    .invite-card::after {
      content: "";
      position: absolute;
      width: 92px;
      height: 92px;
      border: 1px solid rgba(201,169,106,0.35);
      border-radius: 50%;
      opacity: 0.7;
    }

    .invite-card::before {
      top: 18px;
      left: 18px;
      clip-path: inset(0 46px 46px 0);
    }

    .invite-card::after {
      bottom: 18px;
      right: 18px;
      clip-path: inset(46px 0 0 46px);
    }

    .monogram {
      font-size: 1rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 18px;
    }

    .invite-kicker {
      text-transform: uppercase;
      letter-spacing: 0.28em;
      font-size: 0.72rem;
      color: rgba(64, 54, 47, 0.65);
      margin-bottom: 16px;
    }

    .names {
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.08;
      margin: 0;
      font-weight: 500;
    }

    .and {
      display: block;
      margin: 10px 0 8px;
      font-size: 1rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(64, 54, 47, 0.65);
    }

    .invite-copy {
      margin: 20px auto 26px;
      max-width: 290px;
      font-size: 1rem;
      line-height: 1.8;
      color: rgba(64, 54, 47, 0.9);
    }

    .details {
      display: grid;
      gap: 16px;
      margin-top: 18px;
    }

    .detail {
      padding-top: 12px;
      border-top: 1px solid rgba(64, 54, 47, 0.09);
    }

    .detail-label {
      font-size: 0.72rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(64, 54, 47, 0.58);
      margin-bottom: 6px;
    }

    .detail-value {
      font-size: 1.08rem;
      line-height: 1.55;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .button {
      appearance: none;
      border: none;
      text-decoration: none;
      padding: 13px 18px;
      border-radius: 999px;
      font-size: 0.95rem;
      letter-spacing: 0.03em;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      cursor: pointer;
    }

    .button-primary {
      background: var(--sage);
      color: #fff;
      box-shadow: 0 10px 20px rgba(84, 98, 79, 0.22);
    }

    .button-secondary {
      background: rgba(255,255,255,0.66);
      color: var(--text);
      border: 1px solid rgba(64,54,47,0.12);
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .footer-note {
      margin-top: 20px;
      font-size: 0.9rem;
      line-height: 1.6;
      color: rgba(64, 54, 47, 0.68);
    }

    .envelope-stage.opened .flap {
      transform: rotateX(180deg);
    }

    .envelope-stage.opened .seal {
      opacity: 0;
      transform: translate(-50%, -35%) scale(0.86);
      pointer-events: none;
    }

    .envelope-stage.opened .invite-card {
      transform: translateX(-50%) translateY(-70px);
      opacity: 1;
      pointer-events: auto;
    }

    .floating-petals {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      border-radius: 28px;
    }

    .petal {
      position: absolute;
      width: 10px;
      height: 16px;
      background: linear-gradient(180deg, rgba(201,169,106,0.65), rgba(201,169,106,0.15));
      border-radius: 60% 40% 70% 30%;
      opacity: 0;
    }

    .envelope-stage.opened .petal {
      animation: fall 3.8s ease-in infinite;
      opacity: 0.8;
    }

    .petal:nth-child(1) { left: 12%; animation-delay: 0.1s; }
    .petal:nth-child(2) { left: 24%; animation-delay: 0.9s; }
    .petal:nth-child(3) { left: 39%; animation-delay: 0.5s; }
    .petal:nth-child(4) { left: 55%; animation-delay: 1.4s; }
    .petal:nth-child(5) { left: 71%; animation-delay: 0.3s; }
    .petal:nth-child(6) { left: 85%; animation-delay: 1.1s; }

    .audio-toggle {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 12;
      border: 1px solid rgba(64,54,47,0.12);
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(10px);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fall {
      0% {
        transform: translateY(-30px) rotate(0deg);
        opacity: 0;
      }
      10% { opacity: 0.8; }
      100% {
        transform: translateY(620px) translateX(22px) rotate(250deg);
        opacity: 0;
      }
    }

    @media (max-width: 640px) {
      .wrapper { padding-top: 18px; }
      .subtitle { padding: 0 10px; }
      .experience { min-height: 560px; }
      .invite-card {
        width: min(88%, 390px);
        min-height: 480px;
        padding: 32px 24px 28px;
      }
      .detail-value { font-size: 1rem; }
      .hint { bottom: -46px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div class="background-flower"></div>

  <main class="wrapper">
    <section class="intro">
      <div class="eyebrow">Wedding Invitation</div>
      <h1 class="title">Mario &amp; Valentina</h1>
    </section>

    <section class="experience">
      <div class="envelope-stage" id="envelopeStage" aria-label="Apri l'invito" role="button" tabindex="0">
        <div class="floating-petals" aria-hidden="true">
          <span class="petal"></span>
          <span class="petal"></span>
          <span class="petal"></span>
          <span class="petal"></span>
          <span class="petal"></span>
          <span class="petal"></span>
        </div>

        <div class="invite-card" id="inviteCard">
          <!-- Qui verrà mostrata la tua foto dell'invito -->
          <img src="invito.jpg" alt="Invito di matrimonio Mario e Valentina" style="width:100%; border-radius:6px; box-shadow:0 10px 25px rgba(0,0,0,0.15);" />
        </div>

        <div class="envelope">
          <div class="back-pocket"></div>
          <div class="flap" id="flap">
            <div class="flap-face flap-front"></div>
            <div class="flap-face flap-back"></div>
          </div>
          <div class="front-pocket"></div>
          <div class="seal" id="seal"><span>m.v</span></div>
        </div>

        <div class="hint" id="hint">Premi sul sigillo M.V per aprire l'invito</div>
      </div>
    </section>
  </main>

  

  

  <script>
    const envelopeStage = document.getElementById('envelopeStage');
    

    audioToggle.addEventListener('click', async () => {
      if (!bgMusic.querySelector('source')) {
        alert('Per attivare la musica, aggiungi un file mp3 nel tag <audio> del codice.');
        return;
      }

      try {
        if (!musicOn) {
          await bgMusic.play();
          musicOn = true;
          audioToggle.textContent = '♫ Musica: ON';
        } else {
          bgMusic.pause();
          musicOn = false;
          audioToggle.textContent = '♫ Musica: OFF';
        }
      } catch (error) {
        console.error(error);
      }
    });
  </script>
</body>
</html>
